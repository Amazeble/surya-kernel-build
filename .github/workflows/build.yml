name: Build Surya Android 14 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository Files
        uses: actions/checkout@v4

      - name: Install Compiling Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev ccache bison flex libelf-dev clang lld python3 wget zip unzip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone Poco X3 NFC Kernel Source
        run: |
          DOMAIN="https://github.com"
          PATH_PART="/LineageOS/android_kernel_xiaomi_surya.git"
          git clone --depth=1 -b lineage-22.2 "${DOMAIN}${PATH_PART}" kernel-source

      - name: Integrate KernelSU Source Code
        run: |
          cd kernel-source
          DOMAIN="https://raw.githubusercontent.com"
          PATH_PART="/tiann/KernelSU/main/kernel/setup.sh"
          curl -LSs "${DOMAIN}${PATH_PART}" | bash -s main

      - name: Apply Your Custom Configuration Layout
        run: |
          if [ -f "$GITHUB_WORKSPACE/my_current_config" ]; then
            cp "$GITHUB_WORKSPACE/my_current_config" kernel-source/arch/arm64/configs/surya_defconfig
          else
            echo "Warning: my_current_config not found, using existing defconfig"
          fi

      - name: Download Google / Proton Clang Toolchain
        run: |
          # Skip external clang download - use system clang from apt instead
          # External pre-built clang has glibc compatibility issues with ubuntu-latest
          echo "Using system clang toolchain"

      - name: Compile the Kernel Image
        run: |
          set -e
          cd kernel-source
          mkdir -p out
          make ARCH=arm64 O=out surya_defconfig
          make -j$(nproc --all) ARCH=arm64 O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          set -e
          DOMAIN="https://github.com"
          PATH_PART="/osm0sis/AnyKernel3.git"
          git clone "${DOMAIN}${PATH_PART}"
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          elif [ -f kernel-source/out/arch/arm64/boot/Image ]; then
            cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          else
            echo "Error: No kernel image found!"
            exit 1
          fi
          cd AnyKernel3
          zip -r9 ../surya-custom-kernel.zip *

      - name: Upload Finished Flashable Kernel Zip
        uses: actions/upload-artifact@v4
        with:
          name: Surya-Custom-Kernel-Package
          path: surya-custom-kernel.zip
